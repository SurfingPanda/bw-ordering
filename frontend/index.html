<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192x192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Pacifico&family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>BW Superbakeshop</title>
    <!-- Pre-paint maintenance guard: if the cached site content says the landing
         page ("/") is in maintenance, hide the prerendered landing HTML behind a
         neutral splash before it paints, so React can swap in the "We'll be right
         back" screen without flashing the live landing page first. Reveal is done
         once React mounts (src/pages/Landing.jsx). -->
    <script>
      try {
        if (location.pathname === '/') {
          var c = JSON.parse(localStorage.getItem('bw_site_content') || 'null')
          if (c && c.maintenance && c.maintenance.enabled) {
            document.documentElement.classList.add('maint-pending')
          }
        }
      } catch (e) {}
    </script>
    <style>
      html.maint-pending {
        background-color: #0b1f3d;
      }
      html.maint-pending #root {
        visibility: hidden;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
